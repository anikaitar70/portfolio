# Nginx config for static Next.js export (out/)
# Add as a second site — does not affect your existing website.

server {
    listen 80;
    listen [::]:80;
    server_name anikait.page www.anikait.page;

    root /var/www/anikait.page;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Resume PDF
    location /resume/ {
        add_header Content-Disposition "inline";
    }
}
